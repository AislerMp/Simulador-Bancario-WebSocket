<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador Bancario Socket</title>
</head>
<body>
  <h1>Simulador Bancario por WebSocket</h1>

  <button id="btnPing">Enviar PING</button>

  <pre id="output"></pre>

  <script>
    const output = document.getElementById("output");
    const btnPing = document.getElementById("btnPing");

    const socket = new WebSocket("ws://localhost:3000");

    socket.addEventListener("open", () => {
      output.textContent += "Conectado al servidor WebSocket\n";
    });

    socket.addEventListener("message", (event) => {
      console.log(event)
      const data = JSON.parse(event.data);
      output.textContent += JSON.stringify(data, null, 2) + "\n\n";
    });

    btnPing.addEventListener("click", () => {
      socket.send(JSON.stringify({
        type: "PING"
      }));
    });
  </script>
</body>
</html>
